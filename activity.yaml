meta:
  id: 1776873519000
  createdAt: "2026-04-22 00:19:00"
  updatedAt: "2026-04-23 00:15:00"

purpose:
  objective: "定义一套通用的活动描述规范，让任何 agent 或人类都能基于 activity.yaml 快速理解并续接一个活动"
  successCriteria: "spec 能自洽地描述自身项目，且能覆盖至少一个非 trivial 的真实活动"
  nonNegotiables: "不编造示例；不绑定执行引擎；字段按需出现"

status:
  phase: growth
  nextMilestone: "完成 dogfooding：用 spec 描述 activity-art 自身，并发现字段缺陷"

risk:
  keyAssumptions: "活动可以被通用模型描述；古典文本的维度映射对现代工程有参考价值；YAML 格式足够表达活动状态"
  topRisks:
    - description: "维度设计过度，小活动用不上"
      mitigation: "保持字段可选，强制按需出现"
    - description: "古籍映射牵强，被人诟病附会"
      mitigation: "README 中诚实承认个人解读，不声称唯一真理"
    - description: "agent 场景下 spec 字段不够结构化，无法被程序解析"
      mitigation: "现阶段先保证人类可读，机器可解析是远期目标"
  fallbackDirection: "如果九维度过于复杂，退化为更轻量的三维模型（道、法、序）"

resource:
  resources: "GitHub 仓库、YAML 编辑器、古典文本知识、agent 交互经验、网络代理"
  hardConstraints: "必须使用 Git 版本控制；README 和 spec 必须保持中文为主；不允许编造示例；仓库必须公开"

rule:
  decisionAuthority: "SpaceRelax 拥有最终决策权，agent 只能建议，不可执行不可逆操作（如仓库创建）前必须逐项确认"
  acceptanceCriteria: "每次 spec 变更必须同步更新 activity.yaml；新增字段必须有古籍出处或现实痛点支撑；禁止为完备性而添加未经验证的字段"
  mandatoryProcesses: "任何改动先写本地文件，preview 确认后再 push；保持 commit message 中英双语；issue/PR 暂不接受（WIP 阶段）"

stakeholder:
  subAgents:
    - type: "调研agent"
      role: "调研有哪些古籍可能对活动建模有参考价值"
      expectedOutput: "古籍候选清单，附简要相关性说明"
    - type: "归档agent"
      role: "对选定的古籍进行归档记录，建立可查阅的文献档案"
      expectedOutput: "已归档古籍列表及基本信息（书名、朝代、核心概念）"
    - type: "分析agent"
      role: "深入分析和理解已归档古籍的内容，提炼与活动建模相关的维度、概念和洞察"
      expectedOutput: "古籍概念映射报告，提炼出的候选维度及出处依据"
    - type: "实施agent"
      role: "根据古籍分析结果改进项目（调整 schema、更新文档、维护仓库）"
      expectedOutput: "改进后的 spec/文档/代码，以及维护中的仓库状态"
  verificationNote: "调研结果必须经过 SpaceRelax 确认后才能归档；分析结论必须经确认后才能实施；归档与分析形成闭环，避免跳过分析直接实施"

action:
  steps:
    - description: "用 dogfooding 检验 spec 字段实用性"
      dependency: "spec 草稿已完成"
    - description: "根据 dogfooding 发现回改 activity.spec.yaml"
      dependency: "完成 activity.yaml 填写"
    - description: "补充至少一个真实非 trivial 活动案例"
      dependency: "spec 字段稳定"
    - description: "验证单文件 activity.yaml 是否足以替代之前的两文件系统"
      dependency: "activity.yaml 定稿"
  completed:
    - description: "创建 GitHub 仓库并初始化 README、LICENSE、.gitignore"
      completedAt: "2026-04-22 08:19:00"
    - description: "定义九维度 YAML spec 草稿"
      completedAt: "2026-04-22 23:52:00"
    - description: "仓库 push 完成，README + spec 上线"
      completedAt: "2026-04-22 23:58:00"
    - description: "删除 activity-art.yaml，改用无后缀的 activity.yaml，调整 stakeholder 为角色视角"
      completedAt: "2026-04-23 00:15:00"
  priorityPrinciple: "诚实优先于完美；能描述真实活动优先于覆盖 edge case；角色分离优先于工具绑定"
